id: d7-add-vision
language: java
severity: hint
note: "[D7>=2] Vision pose fused into estimator."
rule:
  pattern: '$E.addVisionMeasurement($$$)'
---
id: d7-pose-estimator
language: java
severity: hint
note: "[D7>=2] SwerveDrivePoseEstimator constructed."
rule:
  pattern: 'new SwerveDrivePoseEstimator($$$)'
---
id: d7-stddev
language: java
severity: hint
note: "[D7>=3] Dynamic vision std-dev tuning / rejection."
rule:
  pattern: '$E.setVisionMeasurementStdDevs($$$)'
---
id: d7-robotstate
language: java
severity: hint
note: "[D7=4] Dedicated RobotState world model owning pose."
rule:
  kind: class_declaration
  has: { field: name, regex: '^RobotState$' }
---
id: d7-time-buffer
language: java
severity: hint
note: "[D7=4] Time-interpolated pose buffer — confirms a real world-model (with d7-robotstate)."
rule:
  any:
    - pattern: 'TimeInterpolatableBuffer.$M($$$)'
    - pattern: 'new ConcurrentTimeInterpolatableBuffer($$$)'
---
id: d7-vision-io
language: java
severity: hint
note: "[D7>=3] Vision behind an IO interface (decoupled from Drive, sim-able)."
rule:
  kind: interface_declaration
  has: { field: name, regex: '(Vision|Camera)IO$' }
