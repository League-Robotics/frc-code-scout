{{ define "main" }}
<section class="session-header" data-jump="Overview">
  <span class="eyebrow"><span>Section</span><span class="pos">· {{ .Title }}</span></span>
  <h1 class="session-title">{{ .Title }}</h1>
  {{ with .Summary }}<p class="session-summary">{{ . }}</p>{{ end }}
</section>

{{ if .Content }}
<section class="section-block" data-jump="Overview">
  {{ .Content }}
</section>
{{ end }}

{{ if .Pages }}
<section class="section-block" data-jump="Lessons">
  <div class="section-head">
    <h2>Chapters</h2>
    <span class="section-meta">{{ len .Pages }} total</span>
  </div>
  <ul class="lesson-list">
    {{ range sort .Pages "Params.weight" }}
    <li><a href="{{ .RelPermalink }}">{{ .Title }}</a></li>
    {{ end }}
  </ul>
</section>
{{ end }}
{{ end }}
